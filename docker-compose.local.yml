services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  rag-orchestrator:
    build:
      context: .
      dockerfile: services/rag-orchestrator/Dockerfile
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: staging_medqa
      EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
      RAG_TOP_K: "7"
      RAG_MIN_SCORE: "0.45"
      RAG_MAX_CONTEXT_TOKENS: "2000"
      REDIS_URL: redis://redis:6379/0
      KSERVE_ENABLED: "true"
      KSERVE_BASE_URL: https://api.groq.com/openai
      KSERVE_COMPLETIONS_PATH: /v1/chat/completions
      LLM_MODEL_ID: llama-3.3-70b-versatile
      LLM_API_KEY: <YOUR_GROQ_API_KEY>
      LLM_MAX_TOKENS: "2048"
      LLM_TEMPERATURE: "0.3"
      LLM_TOP_P: "0.9"
      LLM_FREQUENCY_PENALTY: "0.6"
      LLM_PRESENCE_PENALTY: "0.4"
      LLM_TIMEOUT_S: "30"
      LLM_RETRIES: "1"
      OTEL_SDK_DISABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - redis

  streamlit-ui:
    build:
      context: .
      dockerfile: services/streamlit-ui/Dockerfile
    environment:
      RAG_API_URL: http://rag-orchestrator:8000
      RAG_API_TIMEOUT_S: "60"
      OTEL_SDK_DISABLED: "true"
    ports:
      - "8501:8501"
    depends_on:
      - rag-orchestrator

  qdrant-ingestor:
    build:
      context: .
      dockerfile: services/qdrant-ingestor/Dockerfile
    environment:
      QDRANT_COLLECTION: staging_medqa
      EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
      OTEL_SDK_DISABLED: "true"
    command:
      - --qdrant-url
      - http://qdrant:6333
      - --top-level-path
      - /data
      - --input-path
      - .
      - --patterns
      - "*.txt,*.md,*.jsonl"
    volumes:
      - ./services/qdrant-ingestor/data:/data:ro
    depends_on:
      - qdrant
    profiles:
      - ingest

volumes:
  qdrant_storage:
  ollama_data:
